<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5e Companion - DM Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 60px auto;
    }
    .auth-error {
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container auth-container" style="position:relative;z-index:1;">
    <div class="card" style="border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.22);">
      <h1 style="text-align:center;margin-bottom:0;">5e Companion</h1>
      <p style="text-align:center;color:var(--text-muted);margin-top:4px;margin-bottom:20px;">Dungeon Master Login</p>
      <div class="auth-error" id="auth-error"></div>
      <form id="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="f-username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="f-password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="auth-submit">Log In</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('f-username').value.trim();
      const password = document.getElementById('f-password').value;
      const errorEl = document.getElementById('auth-error');
      errorEl.style.display = 'none';

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error;
        errorEl.style.display = 'block';
        return;
      }

      localStorage.setItem('dmToken', data.token);
      localStorage.setItem('dmUsername', data.username);
      window.location.href = '/dm';
    });

    // If already logged in, redirect
    if (localStorage.getItem('dmToken')) {
      window.location.href = '/dm';
    }
  </script>
  <footer class="srd-footer">
    <p>This app uses content from the <em>Systems Reference Document 5.2</em> by Wizards of the Coast LLC, licensed under the <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">Creative Commons Attribution 4.0 International License</a>.</p>
    <p>This app is not affiliated with, endorsed, sponsored, or approved by Wizards of the Coast LLC.</p>
  </footer>
</body>
</html>
